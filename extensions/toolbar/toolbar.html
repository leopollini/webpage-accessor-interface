<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>My Electron Tab Manager</title>
	<style>
		/* Basic styling for tab bar + views */
		#tabBar {
			display: flex;
			overflow-x: auto;
			background: #eee;
			padding: 4px;
		}
		.tab {
			padding: 4px 8px;
			margin-right: 4px;
			background: #ddd;
			border-radius: 4px 4px 0 0;
			cursor: pointer;
			position: relative;
			
			max-width: 100px;        /* limit tab width */
			white-space: nowrap;      /* prevent wrapping */
			overflow: hidden;         /* hide overflow */
			text-overflow: ellipsis;  /* show "..." for long text */
		}
		.tab.active {
			background: white;
			border-bottom: 1px solid white;
		}
		.tab .close {
			position: absolute;
			right: 2px;
			top: 0px;
			font-size: 12px;
			cursor: pointer;
		}
		#viewContainer {
			position: absolute;
			top: 40px;  /* adjust as needed */
			bottom: 0;
			left: 0;
			right: 0;
		}
		webview {
			width: 100%;
			height: 100%;
			display: none;
		}
		webview.active {
			display: block;
		}
	</style>
</head>
<body>
	<div id="tabBar">
		<!-- tabs will be injected here -->
		<button id="newTabBtn", style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"">+ New Tab</button>
	</div>
	<div id="viewContainer"></div>

	<script>

window.manage_tabs.onDoCreateTab(createTab);
window.manage_tabs.onDoCloseTab(closeTabId);

const tabBar = document.getElementById('tabBar');
const viewContainer = document.getElementById('viewContainer');
const newTabBtn = document.getElementById('newTabBtn');

let tabs = [];
let activeTab = null;
let tabCount = 0;

newTabBtn.addEventListener('click', request_tab, {once: true});

function request_tab()
{
	console.log("new tab requested");
	newTab('asdasdasdasd');
}

async function newTab(content)
{
	activeTab = null;
	createTab(await window.manage_tabs.createdTab(content));
	
	newTabBtn.removeEventListener('click', request_tab);
	newTabBtn.addEventListener('click', request_tab, {once: true});
}

async function createTab({title, success}) {
	// create tab element
	if (success != true) return console.log('page creation not succesful');
	const tabEl = document.createElement('div');
	tabEl.classList.add('tab');
	tabEl.id = tabCount;
	tabEl.textContent = title;
	tabEl.dataset.index = tabCount++;
	const closeBtn = document.createElement('span');
	closeBtn.textContent = '×';
	closeBtn.classList.add('close');
	tabEl.appendChild(closeBtn);
	tabBar.insertBefore(tabEl, activeTab ? activeTab.nextSibling : newTabBtn);
    tabs.push(tabEl);

	// event handlers
	tabEl.addEventListener("click", () => {
		activateTab(tabEl);
	});
	closeBtn.addEventListener('click', (e) => {
		e.stopPropagation();
		closeTab(tabEl);
	});

	// activate it
	activateTab(tabEl);
}

function activateTab(tabEl) {
	console.log('switching to', parseInt(tabEl.dataset.index));
	window.manage_tabs.switchTab(parseInt(tabEl.dataset.index));
	tabs.forEach(t => t.classList.remove("active"));
	tabEl.classList.add("active");
	activeTab = tabEl;
}

function closeTabId(tabId)
{
    console.log("requested to close tab", tabId);
	tabs.forEach(tab => {
		if (tab.dataset.index === tabId)
			removeTab(tab);
	});
}

function removeTab(tabEl)
{
	console.log("ALL TABS:", tabs);
	tabs = tabs.filter(tab => tab.dataset.index !== tabEl.dataset.index);
	console.log("ALL TABS:", tabs);
	tabEl.remove();
	window.manage_tabs.closeTab(tabEl.dataset.index);
    if (tabs.length != 0)
		activateTab(tabs[0]);
	else
		newTab({title: 'asdasdasd', success: 'true'});
}

function closeTab(tabEl) {
    console.log("closing tab", tabEl.dataset.index);
	removeTab(tabEl);
}
	</script>
</body>
</html>
