        <br>
        <br>
        <button id="readfile">read file please</button>
        <text style="display:none" id="loltext">this shows up on pointerdown event</text>
        <br>
        <text style="display:none" id="loltext2">this shows up on doubleclick event</text>
        <br>
        <text style="display:none" id="loltext3">this shows up on rightclick event</text>
        <br>

        <text style="display:none" id="termid_t">I am </text> <text style="display:none", id="termid"></text> <br>
        <text style="display:none" id="termkey_t">My code is </text> <text style="display:none", id="termkey"></text>
    </body>
    <script>
        $(function () {
            $("#readfile").on('dblclick', async function () {
                // alert(JSON.stringify(await window.electronAPI.getLocalKey()));
                $("#loltext2").show();
            });

            $("#readfile").on('pointerdown', function () {
                $("#loltext").show( );
                if (window.electronAPI.getLocalKey)
                {
                    console.log("Calling local keys");
                    let asd = window.electronAPI.getLocalKey().then(function (terminfo) {
                        console.log("Got from electron:", terminfo);
                        if (!terminfo || !terminfo.terminal_id || !terminfo.terminal_key)
                        {
                            $('#termid').show().text("no terminal info");
                        }
                        else
                        {
                            $("#termid_t").show();
                            $("#termkey_t").show();
                            $('#termid').show().text(terminfo.terminal_id);
                            $('#termkey').show().text(terminfo.terminal_key);
                        }
                    });
                }
                else
                {
                    $('#termid').show().text("terminal info not accessible")
                }
            })

            $("#readfile").on('contextmenu', function (e) {
                $("#loltext3").show( );
            })

            $(document).on('pointerdown', function () {console.log("pointer down.");})
            $(document).on('pointerup', function () {console.log("pointer up.");})
            $(document).click(function () {console.log("pointer click.");})
            $(document).on('pointermove', function () {console.log("pointer move.");})
            $(document).on('dblclick', function () {console.log("pointer double click.");})
        });
    </script>
</html>
